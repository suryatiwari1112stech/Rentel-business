{% extends "base.html" %}

{% block content %}

<h1>Admin Dashboard</h1>

<a href="/add" class="btn">Add Room</a>

<table>

<tr>
<th>ID</th>
<th>Title</th>
<th>Price</th>
<th>Location</th>
</tr>

{% for room in rooms %}

<tr>

<td>{{room.id}}</td>
<td>{{room.title}}</td>
<td>{{room.price}}</td>
<td>{{room.location}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
